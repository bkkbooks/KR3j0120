body:
  text: 密齋續筆記宋謝采伯撰髙祖不修文學而創大業蓋承秦之敝寬仁愛人有帝王之度光武南陽賢宗室受尚書於廬江許子成紹復太業之後數引公卿郎將講論經理夜分乃罷所用諸將如鄧禹受業長安內文明篤行淳備事母至孝冦恂素好學經明行修名重朝廷馮異好讀書通左氏傳又上書謝曰臣本諸生云云乃知性與天道不可得而聞也詔答云孟之反不伐奔而殿亦何異哉賈復少好學習尚書後與鄧禹並戢甲兵崇儒學耿弇學老子於安丘先生少好學習父業祭遵少好經書取士皆為儒術對酒設樂必雅歌投壺雖在軍旅不忘爼豆耿純學於長安朱祐尚儒學景丹少學長安劉隆學於長安十人皆儒將風聲氣習與屠沽負販固自天壤然其關係甚逺治體醇疵之所由分明章再傳儒學彬彬羣賢傳中名節凛然餘朝代所不及豈非詩書餘澤耶隋末大亂而儒學盛於貞觀陸德明論撰甚多曹憲文選之學授魏模公孫羅李善顔師古注漢書孔頴逹五經正義孔至氏族之學張嗣宗經學授秦王蕭德言裒次經史百氏帝王所以興衰者上之僧許淹馬嘉運棄墨從儒並名家唐初學者學有根柢至于元和間文士輩出華盛實衰矣馮道取西京鄭覃所刋石經雕為印板流布天下後進賴之武君開我宋文明之治癡頑老子廣經學之門此老篤行有古人風值武君無禮無義互相吞啖篡奪日尋使不得死臣節為恨王祥琅邪人吕虔檄為徐州别駕破賊人歌曰海沂之康實賴王祥仕至太尉年八十五弟覽孝友恭恪名亞於祥以太中大夫歸老吕虔以三公刀與祥祥與覽曰汝後必有興者司徒導即其孫也悅恬洽劭薈珣珉謐舒晏之崑之植之允之晞之肇之廙彬彪之頤之胡之茂之敬𢎞藉之彭之越之臨之稜羲之凝之徽之楨之操之獻之靜之敦戎衍澄皆琅邪裔也祥之孝固難覽之悌為尤難孝弟之至通于神明是以自天祐之子孫衆多也龍山之宴孟嘉恥為征西客故假落帽以蓋其慙淵明出宅邊菊叢中值王𢎞送酒至即便就酌醉歸陶乃孟甥也九日美談舅甥都占斷後人無以復加亦一段奇事元載以貪被誅籍其家胡椒八百石楊綰以清簡儉素代其平章事郭子儀減聲樂黎幹省騶從崔寬撤第舍盛德感人習俗一變而四月拜命七月己巳薨司馬光元祐元年閏二月拜左僕射公首更詔書開言路分别邪正進退甚者十餘人旋罷保馬市易助役青苖鹽鐵茶法復常平糶糴法身徇社稷躬親庶務而是年九月丙辰薨二公天不假年相業未究古今惜之君子有福小人無福此治世也君子無福小人有福事可知矣荀彧本傳云留壽春以憂薨魏氏春秋曰飲藥而卒通鑑取魏氏春秋所言司馬溫公論曰文勝質則史凡為史者記人之言必有以文之然則比魏武于髙光楚漢者皆史氏之文也豈彧所言耶用是貶彧非其罪矣某曰彧附曹氏終始昭然杜牧之已結正欵無可逃者百世之下所信者史而以為非彧口所言吾意其臨薨所焚毁陳事書皆奇策密謀者無非傾漢滅劉氏之邪謀不可以示海內傳後世者也豈可謂之皆史氏之文也愚者一得之慮不敢自遜于先哲李密起拱州據洛口倉回洛倉黎陽倉足食足兵似得計矣而柴孝和勸取關中密不從以致於敗李淵起太原欲回軍世民力諫取關中哭於帳外夜追前軍回竟入關中關中若柴紹等皆以兵來迎大勢遂定薛舉亦欲入關已無及漢業開基亦是關中關中中原一大形勝之地范致虗以三十萬勤王關中失守遂分南北可恨也士未逢時失身於人固為不幸士而逢時能以功名自見亦未為不幸也魏徵始為道士為武陽郡丞元寶藏客又為李密典書又為竇建德起居舍人隱太子洗馬王圭為建成中允後太宗並召為諫議大夫李大亮為龎玉兵曹又為李密所擒岑文本為蕭銑客溫彥博初為羅藝行軍司馬髙士廉為丘和客後皆為唐名臣黃帝曰夫子數言熱中消中不可服髙梁芳草石藥石藥發癲芳草發狂注云多飲數溲曰熱中多食數溲曰消中多喜曰癲多怒曰狂髙梁之疾也膏梁米也石藥英乳也芳草濃美也富貴之人常服之難禁也肥令人內熱甘令人中滿石藥氣烈非緩心和氣人不可以服是黃帝時已有髙梁又古字通用世人鄙世祿為膏粱不知所出余村居咬菜根決無此二證天地生蔬因時濟人人之啖蔬莫感天地之恩曰菜飯曰蔬食有不滿之色者名曰褻天鶯粟紅白二種痔下者隨色用之即愈辛稼軒患此已殆甚一異僧以陳鶯粟煎全料人參敗毒散吞下感通丸十餘粒即愈密齋續筆記
