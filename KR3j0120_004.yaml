body:
  text: 密齋筆記卷四宋謝采伯撰周禮雞人主旦呼漢宫中不畜雞衛士專傳雞鳴應劭曰楚歌今雞鳴歌也東坡云今土人謂之山歌家語以黍雪桃先公云中都貴人家多以蒸餅并米糕雪桃豫乃知以黍雪桃之義蓋桃經水即酸故用此晉志云地不足東南天不足西北八紘之外名為八極八極之廣東西二億三萬一千三百里南北二億三萬一千三百里自地至天半八極之數至下亦如之昔黃帝令豎亥步自東極至于西極五億十萬九千八百步不知如何稽考莫是用經界局步弓打量古今注匏瓠也詩曰酌之用匏周禮陶匏祀天又云朝踐用兩壺尊故周有瓠壺形長一尺二寸六分徑一寸兩鼻有提梁取便於用余嘗見一瓠壺形製甚古豈果周器也東坡曰舉匏尊以相屬古今注云太公以玄鉞斬妲己故婦人以為戒曹操納袁熙妻為文帝婦孔融與操書曰武王伐紂以妲己賜周公操以融學士謂書傳所紀後見問之對曰以今度之想當然耳融雖戲操不為無意師之於門人則名之於朋友則字之稱於師雖朋友亦名之子曰吾與回言又曰參乎吾道一以貫之又曰若由也不得其死然是師之名門人也夫子于鄭兄事子産於齊兄事晏嬰曰子謂子産又曰晏平仲善與人交子夏曰言遊過矣子張曰子夏云何曽子曰堂堂乎張也是朋友字而不名也子貢曰賜也何敢望回又曰師與商也孰賢子遊曰有淡臺滅明者是稱於師雖朋友亦名之也論語書法之嚴即春秋書法也孔子謂晏子能折衝樽爼即孫子所謂上兵伐謀其次交兵其下攻城世言善用兵者暗合孫吳亦暗合孔子其言一曰道亦不離乎道也郤縠為詩書之帥豈嗜殺者耶文中子曰折衝樽爼不必臨邉亦孔子意也衛世子蒯聵篡輒而立子路死之孔子哭進使者而問故使者曰醢之矣遂命覆醢乃知漢髙祖誅彭越醢其肉以賜諸侯乃自春秋時已然滕公佳城碑云三千年見白日逆數上三千年乃是少昊時節那時淳古不封不樹安得已如此可疑管子弟子職曰凡置飲食鳥獸魚鱉必先菜羮注云先菜後肉食之次也弟子之奉師以菜為頭味此論語所以疏食與菜羮瓜並言城門失火殃及池魚古語有之一見風俗通一見百家書曰宋城門失火汲取池中水以沃之魚悉露見因就取之又廣韻注云司門者姓池名仲魚因救城門火焦爛而卒二説未知孰是東魏杜弼移檄梁朝討納侯景曰景必據淮南稱帝但恐城門失火災及池魚嘉熙庚子城中大火余呼百餘人救護靖越門一帶拽拔三處屋支犒六百千及布施三寺池魚之災甚矣家語後序孔子九代孫名最字子産從漢髙祖以左司馬將軍佐韓信破楚於垓下以功封蓼侯年五十三而卒諡夷侯孔子軍旅之事未之學也九世孫最乃以武功顯汪端明應辰請聞人倅阜民食牛百葉聞人曰是何不典之物汪曰周禮注脾析即牛百葉秦詛楚文一告巫咸大神今在鳯翔府一告亞駝神在洛陽劉忱家其文皆聲楚王熊相之惡著諸石章以盟大神之威神治平間蔡挺又獲朝那湫底所刻方陶跋已詳即惠王二十六年後并天下二世而亡佛經云呪詛諸毒藥所欲害身者還著於本人東坡云呪詛諸毒藥兩家各無事祈雨三代用巫覡後世用僧道唐僧不空羅公逺一行無畏祈雨法各不同范石湖吳船録記蜀中祈雨尤不同增堰壅水入支江三四宿水即遍謂之攝水水皆如期而應嘉州雷洞初禱香幣不應則投死彘及婦人敝履之類以掁觸之雷風隨發息壤遇旱則郡守設祭掘之掘至石樓之簷則雨作矣辛幼安云親驗信然開元中魏徴寢堂火災三日詔百官赴弔古禮亦自有人行者孔元用云葛王孫原王景即位之明年賜錢十萬緡盡撤去曲阜孔林宅廟鼎新重蓋極為壯麗自據中原後一人世襲止文林郎今加為中憲大夫六嵗即差官教導淵明家貧瓶無儲粟告五子則曰汝等雖不同生當思四海皆兄弟之義况同父之人韓元長身處卿佐八十而終兄弟同居至于沒齒范子春七世同財家人無怨色不知淵明有何産業慮五子爭分想是怕他窮厮吵或云亦薄有田園但將蕪爾坐客大笑李杜齊名有三東漢李固杜喬李膺杜密唐李白杜子美也若小杜亦有三漢杜周子延年亦習法律故曰小杜律唐杜審權與悰俱顯故審權曰小杜公杜牧之對老杜言亦曰小杜前輩已拈出今書以示子栁仲塗之與范景楊大年之與劉筠齊名固未至于遼絶而溫仲舒之視冦準丁謂之于孫何君子小人之分若薰蕕之不可共器而當時齊名曰溫冦曰丁孫殆是取其一時文名耳端拱二年曽會由鄉貢首擢進士第二人廷試日未昃卷上奏御時蜀人陳堯叟亦有俊譽上覽二人文相埒敏亦如之莫適髙下釋褐並授光祿寺丞直史官名雖甲乙而實與等夷會以親老願補郡遷殿中丞知宣州進士起家之榮古今鮮儷子文靖公亮孫樞密禮寬參政從龍亦其後也人知樂全之薦東坡不知三蘇之始進自雷簡夫之薦文學如東坡而蒲中行為臺官論列謂不學無術嘗販私鹽卒以其言貶東坡知貢舉李方叔被黜其家老乳母大哭曰遇蘇內翰知舉不及第尚奚望閉門而逝後東坡舉白浮歐陽叔弼等曰君為主司而失李方叔兹可罰也時張文潛舍人在坐舉白浮東坡曰先生昔為知舉而遺之其罰維均舉坐大笑想老乳母亦吐氣泉下陳密學襄薦賢一疏三十三人自涑水至鄭俠皆知名當世獨五人不甚顯如虞太熙劉載薛昌朝吳賁吳恕俟考太熙等尺牘見奕修所藏有之必皆名士唐文若子西先生之子喪父後年十三不學一日與羣兒蹴鞠於市院子見之而泣云小官人今不讀書後將如何文若感悟歸謀於母曰院子為吾言如此今欲讀書將自讀耶將從學耶母遣從師遂篤志向學弱冠登科後仕至中書舍人盧元傳初無甚可紀史臣稱其功緦之戚服稱其容本朝吕與叔志一婦人墓云每遇功緦之戚輒茹素一月皆可以風厲薄俗崔元暉嬖妾其子縱以母事之妾剛酷雖縱顯官而數笞詬縱率妻子候顔色承養不懈史為書之程尚書瑀解論語弋不射宿言孔子不欲隂中人之意至周公謂魯公四句則曰可為流涕洪慶善作序有云感發於孔子之一射流涕于周公之四言魏按行作漕為開板初書出秦檜亦自不知忽有人譛謂是譏諷魏隨追官籍其家程洪皆得罪王逢原蝗詩其略曰始知在人不在天譬如蚤虱生裳衣魚枮生蟲肉腐蠧理有當爾夫何疑又長篇云至和改元之一年有蝗不知自何來一蝗百兒月再孕漸恐髙厚塞九垓死時年才二十三早慧而天逢原見器於荆公公以夫人女弟妻之薑愚嘗師康節好施雪中念王陶自荷一鍤剗雪地行二十里訪之陶母子凍坐日髙無炊煙愚解所衣錦裘質錢買酒肉薪炭附火飲食又損數百千為之娶及陶尹洛愚老而喪明自衛州往謁之意陶必念舊哀巳陶對之邈然但遺以尊酒而已愚大失望歸病死余謂愚有救人之心不當萌責報之心陶嘗劾韓魏公不押常朝班神宗薄其為人吕公著言其反覆不可近要自不逃清議薑愚雖一時失望而不失美名康節四十餘未娶亦薑為之娶王允修妹程仁霸攝録事有盜蘆蔔者實竊而所持刃誤中主人尉幸賞以劫聞獄掾受賕掠成之盜稱寃移獄公直其事而尉掾爭不已竟殺盜及月餘尉掾皆暴卒後三十餘年公晝見盜拜庭下曰公夀盡我為公荷擔而往暫對即生人天子孫夀祿朱紫滿門軾幼聞此言已而外祖父夀九十舅氏始貴顯夀八十五曽孫皆仕有聲同時為監司者三人按以上東坡語也四朝國史程之邵傳云曽祖仁霸治獄有隂德仕至顯謨閣待制子唐仕至寶文閣學士是時東坡知其為監司未知其為宣和間登從列蒲宗孟閬州新井人嘗日盥潔有小洗靣大洗靣小濯足大濯足小澡浴大澡浴用八九人一浴至湯三斛他奉養率稱是蜀人生時一浴死後一浴宗孟乃浴洗好潔如此想不洗底直是不洗洗底直是洗師友談記載蘇叔黨云浴是間日人以為勞公殊不憚劉氏家傳云劉為東海望族鄉人歌曰海州東望富劉家朐山一族更奢華牽牛厮兒著錦襖牽車婢子帶金花有名之華者兩請文解紹興辛巳魏公領兵收海州之華與父儼謀罄家財輸軍借補將仕郎兩上書陳六事皆恢復大計孝宗韙之特賜進士出身再倅吳門而殁葬蔡嶺菴有詩刻石許同知為宰時以詞投稼軒蒙賞音即同出訪梅夜歸過一人家禮席華盛客尚未集兩人就坐索飲主人奉之甚謹許曰貴人入宅稼軒曰決無好事諺云破家縣令滅門刺史其家乃邑胥之魁未幾果及禍蘇紳嘗疏王德用宅枕乾岡貌類藝祖出知隨州孔道輔亦劾奏之德用疏言宅枕乾岡陛下所賜貌類藝祖父母所生又唐都城東西岡六民間以為乾數而裴度第在平樂里直第五岡人以其第據岡原譛之廬江太守梁龕明日當除婦服今日請客奏伎丞相長史周顗等三十餘人同會劉隗奏曰嫡妻長子皆杖居廬龕暮宴朝祥慢服之愆宜肅喪紀之禮請免龕官削侯爵顗等知龕有喪吉會非禮宜各奪俸一月以肅其違從之施宜生北走降金試日射三十六熊賦擢髙科入翰林庚辰年來本朝奉使舊與張燾子公同舍因問張子公云記得崇化堂前步月時否子公答以翰林想未忘情本朝耶建鄴謂之鄴相州亦謂之鄴下如魏文帝自鄴徙都洛陽乃相州也唐都長安始分山南諸道乃是終南山之南祝夀謂之南山亦指終南山東接驪山太華西連太白至于隴山北至長安城八十里南楚塞西有石室靈芝南有玉堂陽官崔咸遊終南山乘月吟嘯至感慨淚下沈公雅度帥閩蜀人師先生古上譙樓視三山繞州治而下盤薄於前沈顧而歎曰壯哉師曰有冨貴無豪傑泉南氣候臘後元夕前亦薄寒月餘將近驚蟄便是單衣初試盧橘紫茄紅葵已如五月間去家鄉二千五百餘里寒燠便爾不同淮襄别無險厄是真渙散易滅之地蜀郡西門可六七里有杜工部草堂潭以百花名初未有花乃唐冀國夫人在父母家時有異僧墮汚渠中夫人為浣衣而百花浮水上工部嘗賦浣花流水之句夫人歸西州節度崔寧為小婦節度入奏夫人能散財破賊人楊子琳邦人德之即所居祠夫人後草堂與祠並稱端平丙申遭亂郡城焚蕩此等遺迹聞自無恙張定叟尚書云青城每郊用十五萬緡縳幕屋事已撤之皆諸璫得之嘗奏乞從本府出錢蓋屋庶免逐郊費用或惜其議不行余嘗記先皇考言城外自來不曽蓋殿宇宣和間方蓋了殿宇遂為尼瑪哈駐兵之所杜康善造酒江隂軍人今杜橋即其廬事具本縣圖經吐突承璀閩人也寧宗時諸道嵗進閹兒號私白閩嶺最多朱茶馬儉丙午入對云掘地得一銅弩機塗金上靣皆有分寸次日製一小弩以進乃知書中所謂往省括於度至則釋别作一句往放也放箭則必省于度之分寸以為射之逺近此三代弩制度石勒得一鼎容四斗中有大錢三十文皇考權金部時點左藏庫梨園弟子玉帶十有二條并關侯印印上有環凡物之真者即有一偽者久之知有偽而不復知有真矣髙麗席側可捲舒價貴未易得四明便造假髙麗席真水晶瑩徹可愛上饒便造假水晶色青按永樂大典本裂為二則今改正嶺外代答云崑崙曽期國海島有鵬飛蔽日遇駱駝吞之鵬翅管可截為水桶諸蕃志云勿拔國大魚長十丈徑髙二丈木蘭皮國麥粒長三寸瓜圍六尺榴重五斤桃重二斤香圓重二十餘斤萵苣菜一莖重十餘斤沙華公國蓮長尺餘桃核長二尺北方人物果蓏長大便自與江南不同外國可想而知莊生亦據齊諧志怪之説爾雖云寓言亦有所本對衣謂上衣下裳一對也裼襲裼謂裼開襲謂重合也郝象賢父處俊天后素銜之故因事誅象賢臨刑極罵乃死自是刑人必以木圓窒口今用木桃始於此銀朱方用得二百餘年古畫皆以朱色别畫之久近可以此辨梅類腦香清茉莉類海南脫落沉香甘杏花類篤耨香溫荷花類蠻沉香烈素馨類麝香媚諸花香天韻俱勝絶諸香品却有優劣同此一英華之氣散在草木禽獸者豈亦各從其類耶豫董四明舶務見髙麗國賜都綱張迪等批人參二斤參字用草頭韻略無此字有參字云藥草亦通作參玉篇參下有草頭蔘字注同上今方書悉用參字髙麗用蔘字裝潢匠裝乃裝背潢乃今之所謂糨紙者唐人進奏文字多用潢紙寫故韓退之集中有用生紙寫之語諺有云裝潢子亦不為無據烏始生母哺之六十日稍長子反哺如母哺之數一名烏公密齋筆記卷四
