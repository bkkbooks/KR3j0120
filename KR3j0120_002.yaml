body:
  text: 密齋筆記卷二宋謝采伯撰武帝欲立昭帝以子幼恐效吕氏殺鉤弋夫人云汝以子不得活矣太宗感李淳風之言欲盡殺後宫淳風曰不可恐生少者陛下子孫無遺類遂髠為尼聚之感業寺二君割情絶愛思患預防可謂剛明果斷之主然漢以元后稔王莾之變唐以高宗召則天之禍孰謂人事果能勝天聖人苐言修德以弭天變未聞殺人以杜後患漢武帝祠神君最貴曰太一非可得見聞其言與人音等時去時來居室帷中所言世俗之所知無殊絶者而天子心獨喜即今之鳴童也後漢止三宗九帝皆幼沖一百十八年政歸母后幸竇鄧之賢內外扶持無大變故士大夫知禮義尚名節未嘗屈身阿附后族乞憐中常侍以求進者有李固李膺范滂陳蕃郭泰諸名儒為之倡故至於曹操之世尚不敢染指漢鼎蕭何説漢王曰臣願大王王關中養其民以致賢人收用巴蜀還定三秦天下可圖也鄧禹説光武曰於今之計莫如延攬英雄務説民心立高祖之業救萬民之命以公而慮天下不足定也蕭何鄧禹開口議論便是混一規模諸葛亮草廬語曰操已擁百萬之衆挾天子以令諸侯此誠不可與爭鋒孫權有江東已歷三世國險而民附賢為之用此可與為援而不可圖也開口議論吳魏便自下手不得畢竟跨有荆益只是偏霸規模無復混一氣象漢唐之禍激於君子成於小人成於小人固勢所必至激於君子實念慮有所不及春秋之法責備賢者可恨也夫陳蕃年八十餘老成慮事非不詳而誅曹節不克遂成黨錮之禍漢因以亡李訓通經明易立志非不正而誅仇士良不克遂成甘露之禍唐自此亦亡人皆知亡漢唐者由宦官吾以為亡漢唐者蕃與訓也蕃訓之謀不萌宦者雖用事干紊朝綱然變決不如是之亟禍決不如是之酷國決未至於遽亡則為禍首者蕃與訓也然則宦者終不可去歟曰芟夷以漸區處有術害去而人不知功成而禍不作謀必謹於其始事必稽其所終則得矣夫子曰人而不仁疾之已甚亂也聖人豈不疾惡而戒其已甚者慮後患餘禍之未艾也夫子嘗誅少正卯矣而未聞其為亂者聖人之功用與君子固不同也程泰之考古編言太宗虬鬚可挂弓杜詩謂中有美少年虬鬚十八九秦王時在坐真氣驚户牖是虬鬚乃太宗太平廣記所載李衛公遇虬鬚客云後十餘年數千里外有異事是吾得事之秋貞觀中靖位至僕射東南蠻夷報有海賊以千艘精甲十萬人入扶餘國殺其主自立國內已定虬鬚有成功矣或曰衛公兵法半是虬鬚所傳乃知又别是一虬鬚豈英氣所鍾適同耶隋大業中置進士科武后永昌元年始試進士於洛城殿殿試自此始久視二年設武舉皆作法於亂世非哲王之令典而自唐以來沿襲不廢士以為榮初不知煬帝武后為何如主也武后已為后高宗令上官儀草詔欲廢之楊貴妃亦兩為明皇遣出外宅二君亦不為不知其非而不能決於必行所謂惡惡而不能去善善而不能用邦由以亡幸蜀記云馬嵬之變陳玄禮以兵諫可謂急矣明皇云妃子朕自處置遂馳入驛門內立旁小巷不忍歸聖情昏默久而不進韋見素男京兆府司録鍔進曰臣欲吐萬死之言陳社稷之計伏願陛下留意少聽臣聞螫手斷腕者非不痛嬰病餌藥者非不苦夫痛之與苦非人所欲而莫能不為者蓋全乎大體也今宗社震駭朝野驚惶陛下去御座涉草莾可謂螫手嬰疾矣豈可懼解腕苦口之難乎臣觀衆意怒妃子事冝成敗之間在晷刻矣臣嘗讀荀悅漢紀有曰以計勝色者昌以色勝計者亡今日之事伏惟陛下割恩斷愛以寧邦國因就地叩頭流血被面上親以手策起之鍔初請幸蜀云臣年三十未嘗逺逰時鍔以宰相子年才三十激烈慷慨如此天寶全盛時東閣郎君乃有此人物耶男陽也陽則明明則理無不通陽主舒主噓舒且噓則財有所施陽主生生則物無往而不愛男子者皆陽之象也女隂也隂則晦晦則理有所蔽隂主慘主吸慘且吸則財有所靳隂主殺殺則物無往而能愛婦人者皆隂之象也前漢外戚傳乃在胸奴傳後夫妃后儷乎至尊合聯比帝紀乃置之胸奴傳後班固以為平日後宫之費不下一敵國而吕太后趙飛燕等內戕皇嗣外擅兵權漢之存亡在其掌握甚於胸奴雖謂之女戎可也置之於胸奴之後亦可也其負宗社誤國家附之於帝紀之後不可也其敘傳曰桀之放也用末喜殷之滅也嬖妲己幽王之禽也淫褒姒是三代之亡也由于內不由于外也明皇失國由一楊妃亦三代之覆轍是百萬之師不若一女子足以亡人之國也餘史外戚未嘗在胸奴傳後此班史所以為諸史冠也唐莊宗時皇太后皇后交通藩鎮太皇曰誥令皇后曰教命教命蓋始於此后欲殺郭崇韜莊宗不從因自作教命與繼岌竟殺之后即笞劉叟於宫門者劉叟蓋其父也莊宗為郭門高所弒五坊人聚樂器而焚之歐陽公云君以此始必以此終莊宗好伶而弒於門高焚以樂器可不戒哉余曰非也其禍蓋起於劉后之擅殺郭崇韜也始劉后聽宦者讒言遣繼岌殺郭崇韜皇弟存義崇韜之壻讒者曰存義且反為婦翁報仇乃因而殺之又讒朱友謙不自安必反於是及其將五六人皆族滅之門高姓郭拜崇韜為叔父而存義又以門高為養子時馬直軍王溫宿衛禁中夜謀亂被誅莊宗戲門高曰汝黨存義崇韜負我又教王溫反復欲何為乎門高恐退而激軍士為變從樓上射莊宗傷重踣於絳霄殿下其禍起於劉后之擅殺崇韜特成於門高爾門高優伶傳名從謙姚萇掘苻堅尸鞭撻無數裸剝衣裳荐之以棘坎土而埋之姚萇又夢苻堅將鬼兵入營萇懼走入宫宫人迎萇刺鬼誤中萇隂出血石餘萇遂患隂瘇醫刺出血如夢竟狂言而死姚萇巳鞭堅尸尚能見夢邪慕容廆引朱左車胡毋翼孔纂為賔友劉讚儒學該通引為東庠祭酒世子皓率國胄束修受業焉廆覽政之暇親臨聽之廆嘗著家令數千言年六十五在位四十九年皓第三子也聽言賞諫雅好文籍勤於講授學徒千餘人又著典教十五篇以教胄子至子雋嗣位復立小學於顯賢里以教胄子雋酒酣賦詩談及經史垂皓第五子也再復燕國年七十一寶皓之孫亦從儒學工談論善屬文引中書令常忠尚書陽鏐等于東堂問伊周事談宴賦詩文物藹然十六國中惟慕容有家法國祚受命亦稍延姚襄溫故知新講論道藝萇令留臺諸鎮各置學官又臨終謂其子興曰汝撫骨肉以仁接大臣以禮待物以信遇黔首以恩興亦講論經籍不以兵難廢業又與鳩摩羅什及僧略諸人校新經八百餘卷州郡化之事佛者十室而九若劉淵聰粲曜石勒虎閔苻生赫連勃勃等其淫酷屠戮爭事殘暴其享國不久也宜矣襄國大雨雹石勒問徐光對曰去年禁寒食介推帝鄉之神怨憾動上帝勒下書曰寒食并州之舊風子推厯代攸尊請復寒食更為植嘉樹立祠堂黃門郎韋謏駮曰自子推已前雹者復何所致此自隂陽乖錯且子推賢者曷為暴害如此求之冥趣必不然矣左傳史記新序汝南先賢傳鄴中記後漢周舉傳皆言之舉為并州刺州作弔書置子推廟言盛冬去火殘損民命非賢者之意寒食乃是冬仲非今之清明石勒問徐光事容齋不載石虎獲劉曜女年十二有殊色嬖之生子世十嵗立為皇太子劉氏為皇后虎死遵弒世火災月餘後為慕容恪所擒趙亡苻堅滅燕慕容沖姊為清河公主年十四有殊色堅納之寵冠後庭沖年十二亦有龍陽之姿又幸之姊弟専寵宫人莫進果符一雌復一雄雙飛入紫宫之謠夀春之敗沖叛自立為皇帝據長安堅死秦亡石虎擒曜苻堅滅燕皆有席卷天下之勢而卒皆因所滅之國一小女子其國亦亡異哉楚鄭褎紿新人以掩鼻而楚王割其鼻魏王與龍陽君共船而釣龍陽君得十餘魚而涕下王問之曰美人多矣亦猶臣前所得魚也臣亦將棄矣王布令曰四境之內有敢言美人者族婦人智術高出男子之右雖自古而然亦成周時八百餘年之後侯國子弟昏懦愚暗容易為婦人所紿三世之將道家所忌昔有是言六韜為後世談兵之祖而太公封於齊與周匹休至田氏之篡其傳亦已久太公之謀一出於正爾陳勝吳廣起隴畝便會使錢知秦將賈人子即啖以利陳平布陳金多得善處又令捐金四萬斤間疏楚君臣干戈中也只揮金漢高祖巳曽入韓信壁奪其軍自垓下戰勝還定陶又馳入韓信壁奪其軍文帝自代來夜拜宋昌為衛將軍領南北軍張武為郎中令行殿中還坐前殿下亦綽有父風是時習聞兵機將略大率可喜赤壁之戰孫權曰非劉豫州莫可當操者是時孫權運籌於內劉備諸葛亮周瑜關侯等合謀并智方拒得曹操敗之於赤壁亦未為竒政緣曹操雖知兵而未免獨任要是吳事力差弱所以資人劉豫州新敗所以依人若吳蜀勢盛之後却無緣合赤壁之戰關侯精兵一萬周瑜督一萬程普督一萬劉豫州諸葛亮率兵卒不下一萬或詢諸葛孔明以三章之約則曰濟時以寬蓋其學自申韓中來哥舒翰始亦善用兵後困於酒色之娛迫於君命慟哭而出潼關喪師二十萬僅存八千其子曜有志復父讎亦精於用兵諸孫皆以儒學奮峘茂才高第有節槩崿嵫屺皆明經擢第亦中葉尚儒術致然李郭之後文風盛而賢將少唐室微矣軍中不言婦女婦人在軍中兵氣恐不揚孫策周瑜拔皖城納二喬皆國色是以師婚也英鋭豪傑之氣固足辦事畢竟有所溺則智昏智昏則防慮疏策為許貢客箭傷頰創甚年二十六卒瑜為流矢中右脅年三十六卒吕蒙疾發孫權迎置內殿治護萬方募有能愈疾者賜千金病中瘳為下赦令後更增焉權自臨視命道士於星辰之下為請命使其復生當如何其報也房玄齡居秦王府出入十年收人物致幕府居宰相積十五年議論書疏規諫不一與杜如晦共管朝政本傳亦無甚事而當世語良相必曰房杜以今觀之王圭不及魏徴如晦不及玄齡然持衆美效之於君則一也所以為宰相之職魏徴為諫議大夫展盡底藴凡二百奏無不切當帝心本傳所載十餘事凡三上疏王圭為諫議大夫止諫納廬江王瑗姬太常少卿祖孝孫放女樂二事想推誠納善每存規益史臣所以並稱名臣也孫樵文自序云唐廣明元年狂冦犯闕駕避岐陽省方蜀國品藻朝論旌其才行詔曰行在三絶李潼有曽閔之行孫樵有揚馬之文司空圖有巢許之風余歎曰播遷果何時耶從行無救時之略乃以三絶自詫朝論若此豈止清談廢事李郭之後不復有真將兵權下移於岐汴而國亡矣亷吏傳極多上夀公孫洪八十第五倫八十餘李恂九十六吳祐九十八張奐七十八是儀三國人八十一孫謙南史九十二蕭效唐八十裴寬七十五李尚隱七十五薛珏七十四歸崇敬八十八盧鈞八十五餘不紀卒葬無考古儒生經學極多上夀者如伏生治尚書轅固治詩武帝以賢良召伏恭建武四年帝臨雍拜為司空皆年九十任安授孟氏易年七十九申公受詩浮丘伯樓望永平時為侍中皆年八十李尤順帝時遷安樂相年八十三晉宋纎弟子受業三千人鮑靚明河圖洛書年百餘嵗文立譙周泰始初皆年八十陶𢎞景讀書萬餘卷何琦耽玩典籍皆年八十三葛洪以儒學知名自號抱朴子年八十一顏含有操行年九十三辛勉年八十隋公孫景茂好學開皇初為道淄兩州刺史有德政唐曹憲通文選之學皆年百餘嵗歐陽詢年八十五張嗣宗以經授秦王年八十三蕭德言晚節學愈苦年九十七魏收擅史學年七十七若七十者亦多有之兹弗著屈突通七十二尉遲恭七十四李績八十六李靖七十九郭子儀八十五張萬福九十烏承玼九十六吳吕岱九十六諸將功業雖不同然皆克享上夀想無濫殺所致武后興大獄嚴善思為詳審使平活八百餘家原千餘姓按囚司刑寺罷疑不實者百人子向乾元中為鳳翔尹三世皆年八十五丘和附蕭銑為交州總管年八十六子行恭斬冦賊與兄師利迎謁秦王纍從戰伐功多年八十亂世父子以夀終亦有材智足以自全也諸儒西漢自孔光張禹劉歆揚雄號為儒者或依阿取容或諂事新室遂至言符命者以千數朱文公作通鑑綱目標揚雄曰莾大夫揚雄自是千古定論荀彧勸太祖曰奉主上以從民望大順也秉至公以報雄傑大略也彧持論甚正董昭等欲加九錫彧以太祖本興義兵正朝寧國不冝如此太祖由是心不能平彧以憂死是時劉備以帝室之胄英雄表表人望所歸彧能勸太祖推恩以應人望廢昏立明恪秉臣節退處藩服真上策也董昭九錫遂為後日開端相繼貽禍董卓死於吕布苻生死於堅安祿山死於李豬兒史思明死於朝義魚朝恩死於周皓朱全忠死於友圭非人誅之乃天誅也殷羡子浩北伐無功桓溫奏廢為庶人後溫將以為尚書令浩答溫書慮有謬誤閉開數十竟逹空函大忤溫意由是遂絶豈羡投人書於水致浩有是報耶西方鄴所為不法判官談善逹數諫鄴怒遣人告善逹受金下獄善逹素剛辭益不遜死於獄鄴病見善逹為祟卒人之生死一氣之聚散也血氣雖已散寃恨之氣不散也五代武夫用世將謂那時天烏地黑劫嘯時節不復有報應却又自分曉密齋筆記卷二
