body:
  text: 宻齋筆記卷五宋謝采伯撰水火天地之妙用也隂陽之變化也故水火命見六秀作用必大東南方命而時日在西北者性必揫斂謹畏亦主壽西北方命而時日在東南者性必䟽快必發逹至于謹畏壽考决是不過五行貴有歸宿歸宿得好即貴而壽中道無往而不寓故五行有天德貴人皆是抑揚欲得其中如正丁二申正寅月也寅火太過而以丁為德二卯月也卯木太盛而以申為德甲戊庚牛羊甲戊庚皆金木土之陽干也其氣太過遂欲其藏於丑未之位今舉其畧餘可類推即沉潜剛克髙明柔克之義若無氣之火遇亥酉即為息絶愈無氣如丙寅戊戍辛酉戊子張参政命丙申戊戍辛酉戊子乃謝察推命一第便不禄但以意消息其盛衰得中即為貴命過猶不及灾福生焉郭璞授青囊中經九巻於郭公門人趙載竊觀未及讀為火所焚今世所傳者决是贗本隂陽元經乃趙載撰不特弔宫作方乃三命之祖今人以三命生旺之說起於唐李虛中非也龜筴傳有髙人禄命以悅人心之說又在漢初其來乆矣景純年四十九不免南岡之戮管輅年四十八不見女嫁兒娶二人材明先見如蓍龜皆不登中壽地理之說與命相通宗廟比三命天星比五星砂形比相法宗廟天星砂形三者並合而無差則萬不失一言子午針者誣丙午之非用丙午針者排子午之失針法乃五行之樞機禍福之繩墨既無定論何以取凖余編十餘家之說引援詳悉不可盡舉惟一家云曾游厯格古州縣鎮幾百處皆用子午正針以是知子午正針法也中針後人遷就之說也此是有定位形象之物必以子午卯酉奠四方故子午卯酉不易其金木水火之性麻衣易乃近時戴主簿作道藏至雜多房中方術余嘗燃香閲之乃雀卵壯陽等方張君房所編雲笈七籖三百餘卷却無此等方術棲霞宫道藏靈感香火翕習桑都正云藏經不全止有雲笈七籖一部余答云七籖却自㑹靈不必全也抱朴子云道士趙炳以氣禁人人不能起禁虎虎伏地就縛以盆盛水魚龍立見一尺釘入柱氣吹釘躍出療疾以東流水為酌桑皮為脯但行禁呪所療皆除師事徐登人為立祠至於永康俗呼曰趙侯祠至今蚊蚋不能入抱朴子與後漢所紀者如此不知後千餘載台民祠事如父母福庇千里靈響如一日師友談記云徐禧自御史中丞以母喪還洪府有媪以三世禄命書言人吉凶禧俾占之媪曰當兵死徐怒媪以書示之畫一僵尸身首異處徐欲坐以妖言付有司衆觧得免後禧將數萬人守永樂夏兵圍之數重軍大渴開城飲濠城破被害正符媪説唐太宗幾為竇建德㳺兵所擒又幾為單雄信槍所及僅以身免百戰冐矢石間可謂危事不死後餌那羅爾娑婆寐藥乃死名醫不知所為杜伏威與陳稜戰稜軍射中其額伏威曰不殺汝矢不㧞遂馳入稜陣大呼衝擊獲所射將使㧞箭斬之又殺數十人後好神仙長年術餌雲母被毒暴卒李抱真名將亦以服餌誤死乃知藥誤殺人甚於鋒鏑曰精力曰精神曰精氣曰精血曰精明曰精爽曰精到曰精詳曰精妙皆以精為主衞生者當謹之苦海愛河狂瀾弗返其涸也可立而待素問曰法於隂陽和於術數又曰凡隂陽之道陽宻乃固註曰隂陽交㑹之要者正在於隂氣之不泄爾端平元年九月中余奉京祠方抵舍發熱不止面浮目腫不能食一醫者曰非服附不效左右駭笑醫曰行年六十三不服附耶余曰此茈胡證也亟取人参和茈胡煎熱俟呼醫者茅君仲一到亦曰當服茈胡余出煎熱者示之三日疾退目尚多澁食已則困不喜啖魚肉時有饋梨者乃取一顆啖之覺意快再啖一顆酲然晚食後亦如之凡啖梨百五十餘顆熱證悉平本草載趙鄂事陳衍本草載張杲醫說十便方煮梨湯皆云去熱不可以為果子藥忽之諸香藥皆逹氣藿香逹表乳麝木香走經絡沉香趨下皆香氣芳烈能使諸藥快榮衞一切滯氣或曰蜂腊無美味人以為珍果予曰飲食固取美味然亦有取其治療者本草土蜂子去風毒乆服令人恱白功用甚多或云蜂蠆有毒余曰蜈蚣蛇蝎皆愈風良劑何獨於蜂疑之宣和間築順州得枸杞宿根形如獒伏獻厚陵髙踈寮四世祖閌初為太學直學蜀人雷姓者嘗受易于髙每同出入至一銀舖因與其家厚善舖家感其意問曰尊官豈無所湏雷曰無他欲得公鍜銀鼎當以白金百笏為謝舖家駭不敢受強委之既畢舖家曰鼎巳相贈敢問何用雷曰此鼎日乾水銀五十兩又嘗至一小藥舖家往還甚熟因告以欲得舖前藥招如何婦人曰尊官畫一新者見贈便取舊底去雷贈以金將舊畫去畫一新者遺之皆莫知其故雷曰但看吾人他日享用此不盡隆冬張其畫於宻室終日温然乃六丁鑚火圖神筆也按此條永樂大典分為二條今改正米元章不喜韓馬有周百範者以龍眠二馬換大防樓公白集大防曰古有以妾換馬者以書換馬自攻媿始正似王晉卿欲取東坡海石錢穆父王仲至謂不可許坡請易以韓幹二散馬晉卿難之穆父欲兼取蔣頴叔欲焚畫碎石世上雅事何時無之論議紛紛不及書馬兩從不作難也然晉卿以韓馬照夜白易米芾家顔書朱巨川告劉涇又以硯山一石易韓馬夫晉卿重於易海石而不靳博顔書顔書貴矣元章復以易硯石又常以韓馬雜它物易劉涇貞觀御史内史官奴帖數捐韓馬以貿易好嗜自有異耶米氏畫史記馬佳本不定為韓止云唐人妙手且譏世俗見馬即命為曹韓筆宜其不甚愛重也聖人不知後世有佛教今看說底話已為佛教設如明明德足了又添箇新民似又足了又添箇止於至善聖人教人之意其逺如此佛教只說一句明心見性便了果齋先生云楞嚴經云烏從來黑鵠從來白人天本竪畜生本横白非洗成墨非染造從八萬刼無復改移郗皇后妒忌性酷及終后化為蟒帝為懴罪今之梁皇懴是也符丕時徐義為慕容永所獲械埋其足義誦觀音經至夜中土開械脫於重禁之中若有人導之者遂奔楊佺期以為洛陽令李主好佛太祖遣僧為間號小沙彌導以奢侈著乾紅袈裟李主云佛亦莫不如此小沙彌云陛下不讀華嚴經不知佛富貴此誑敵語也庸僧不知出處拈出作話頭韓建治華州患僧雜犯者衆欲貸不可盡治恐傷善類乃擇有道行者為僧正訓治之而非其人反為所憚乆乃悟判牒云本置僧正欲要僧正僧既不正何用僧正使僧自正傳者雖笑以為適中理撫州一祠宇守亟命掀拆梁木壓殞凡六七人池州梁昭明祠累錢為幡守紿語邦人欲集幡錢為神請封典銅陵丞攝郡幕委董其事折幡錢近及五萬丞忽顛仆嘔血不捄二守皆遭臺評嘉定間目擊隠其名氏劉道真錢塘記明聖湖在縣南父老相傳湖中有金牛古嘗有見其映寳靈泉照耀流精神化莫測遂以明聖為名孤山釋智圓字無外自號中庸子有命湖光丈擬韓之作者臨安圗經不詳其事錢塘記一書今亦不復存湧金門湧金池金牛寺命名皆以此杭僧思聰東坡為作字説政和間挾琴登中貴之門遂為御前使臣蘇叔黨以詩止之曰試誦北山移為我招琴聰净慈寺畫壁女像眼多遭剔去或曰撲錢者以塗錢面則撲者不滿又曰倡家取雜粉中則色媚又曰㸃茶以蠱客若然則䕶伽藍神安在安吉州祠山行宫女像如人長眼亦並無全者小人不識罪禍如此官司亦合有禁仲殊長老崇寧中上堂辭衆是夕閉方丈自縊死鄒忠公詩云送行天莫測難作瀆中經殊少為儒雅工樂府㳺蕩不已妻投毒羮中幾死啖蜜而觧故嗜蜜東坡為作老人食蜜歌侍制賈易留心釋氏嘗與楊侍講傑同修西方净土一夕公夢傑曰我已得生西方净土子亦當往公異之未幾聞傑訃攷其亡日與夢之夕同後公以壽終之夕復夢如初或曰齋之用乳是僧家欲啖以肥蔬腸余曰佛西方聖人其俗氊裘為衣乳酪為漿乳非禁食故魯詧釋迦文佛記云有一牧牛女名難陀波羅時净居天王言太子在樹下汝可往供養時於千葉蓮花上取乳糜奉上太子又列子云巨蒐氏之國具牛馬之潼以洗王足又記京師一老醫人云市中成桶擔賣牛乳以泡飲食之則膚革充潤東南人已駭聞佛氏食乳不足多怪張乖崖遇設厨刲羊及百口其毛角召行人估價賣納錢送僧院令與羊子轉經李叅政光有薦羊䟽丈云諸處餽羊既不忍殺十有三頭畜養滋乆遂無脫期今轉變到净財五十貫足躬就報㤙禪寺齋供佛僧看轉經文仍設水陸薦㧞羣羊超生人天者先軰重物命如此余亦效尤為之懴悔采伯皇考未第時謁靈康夢神贈金魚一柈空中呼為碧落侍郎尉剡時夢樗浦廟神延見七層塔上金書牌相字下有謝某名乃知鼎貴已前定豈容人力按皇考原本誤作王考考采伯乃深甫之子今改正嘉熙己亥吳興人云來春米價必踊年時竹簍捕蝦率以所得占米價去冬一簍二十餘故米斗二十千今歳四十餘春初一斛必四十千亦龜卜鳥卜羊卜之類吾俗有蛤肥麥熟蝦荒之說商子墾令言草必墾矣凡二十句大意欲上下之勤農戒酣嬉之敗農使辟淫㳺食之民畢農則草必墾矣余僕早晚聲諾時各令携草而至遂不令而自墾寳慶乙亥余寓報慈改葬亡室初秋夢歸自東家四顧蕩然絶無居室時夕陽未収獨步平沙金星粲屑前山奇秀層出旁植桑竹因賦長篇覺來略成誦尚囁嚅口間迨曉止記憶兩句因筆僧忩云歸來隣里悉不記未免驚呼問桑竹紹定庚寅由泉舶除新安劒浦盜發余自三山道東嘉而歸己丑大浸江岸僅存桑竹嘉熙己亥冬奕脩迎侍寓吳興郡治夢自舊居見城中紅光燭天如萬炬烜赫帢幘浮屠兩尖燎然在目庚子中秋前一日大火余亟呼二十僕入城捄䕶亡姪寺丞靈櫬因略望于共樂堂與己丑之水悉符夢境無毫髮差水現夢於前三年火現夢于前一年吁亦異矣宻齋筆記卷五
