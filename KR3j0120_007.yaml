body:
  text: 原跋右密齋筆記别經史本朝文藝雜書釐為五卷續記一卷先公易班東歸晚年著此比鋟梓家孰而字小不便老眼舛誤未暇考訂奕楙挈來臨汝欲刻置郡齋乃是正魚魯其間至有脫簡者亦復增補使備始得為善本一夕夢先公若有喜色謂奕楙曰汝日所為吾從旁覘之行又往婺女矣蓋大卿兄守婺故也嗚呼先公歿六年而精爽炯然託諸夢以詔諸孤一舉措頃在其左右顧不肖何以稱塞惟戰戰兢兢是戒是懼而已既刋此書屬兩倅題卷末輒復記此時寶祐丙辰孟秋中浣男奉議郎權知撫州軍州兼管內勸農營田事節制軍馬奕楙百拜書昔歐陽公著歸田録范蜀公作東齋記事皆在辭蟬捨冕後蓋前輩於文章翰墨若飢食渴飲未嘗一日廢非有老壯之分仕止之間也密齋先生年六十有三即弭節杜門淡然無營惟耽玩書史逺紹旁搜今觀筆記一書如武庫乍開戈矛劒戟犀利森列使人毛髮竦竪非胸次千古筆力萬鈞疇克爾歟其視歐范二公風流藴藉相似也臨川使君一日出示家集且病舊板漫漶字有脫誤將屬太史王公是正之别鋟之梓方動念間忽夢密齋如平生是知公於斯文雖神逰八極未能忘情嗚呼其精爽豈不可敬畏哉漢韋賢父子以明經位宰相時人為之語曰遺子黃金滿籯不如教子一經今密齋獨以文印傳子孫而使君又克成先志是亦韋氏一經之教由此觀之君家之福未艾也寶祐丙辰季夏朔日通直郎通判撫州軍州兼管內勸農營田事成公䇿識
