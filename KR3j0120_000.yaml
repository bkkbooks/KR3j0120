body:
  text: 提要密齋筆記五卷續記一卷雜家類三雜説之屬臣等謹案宻齋筆記五卷續記一卷宋謝伯采撰伯采字元若台州臨海人宰相深甫之子理宗后謝氏之伯叔行中嘉泰二年傅行簡榜進士歴知廣徳軍湖州監六部門大理寺丞大理寺正宋史無傳其事迹不甚可攷官爵名字僅見於陳耆卿赤城志中是編乃其易班東歸時所撰録以示其子者雜論經史文藝凡五萬餘言自序以為無牴牾於聖人其間援据史傳頗足以考鏡得失雜錄前賢懿言媺行亦多寓懲勸雖持論間有未醇其援引證據亦未見能如容齋隨筆夢溪筆談之博洽而語有本原瑜多瑕少要亦説部之善本也史稱謝后父渠伯早卒兄封郡王姪並節度使端平初頗干國政采伯以世家貴介敭歴中外洊更麾節正當謝后用事之時獨解組逍遥至使史官佚其姓氏則采伯蕭然於榮利之外一無所預可知王宗旦原序謂士大夫晚節嗜好鮮有不迷其初者宻齋獨以書籍詒謀後人使知其老不忘學則采伯潛心著述殆以一生之精力為之宜其言多中理矣原本乆佚僅散見永樂大典中謹採錄編綴分為筆記五卷續記一卷仍所採之舊目焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀宻齋筆記自序余好漁獵書傳時年六十有三易班東歸天賜一閒無以觧日書生結習未除亦自觕有聞見豈應以鶡弁泯沒遂著于篇以示兒軰曰或問者兒軰所質問也經史本朝文藝雜説㡬五萬餘言固未足追嫓作者要之無牴牾於聖人不猶愈於稗官小説傳竒志恠之流乎庶後之子孫知余老不廢學云爾淳祐元年辛丑長至謝采伯元若引宻齋筆記原序寶祐乙卯天台謝公鼓院來守臨川宗旦實為贅貳一日以宻齋筆記授宗旦曰此吾先君子晚年之所著也宗旦受而讀之驚喜嘆賞如逰寶山如閲海市瑰竒詭異之物雜然前陳駭目洞心應接不暇吁是豈淺鮮者所能到哉其殆貫穿百家馳騖千載者歟夫士非窮愁莫能著書一行作吏此事便廢常情之通患也矧耆耋髙蹈燕居引恬未有肯措意於筆硯者宻齋以宰相子敭歷中外洊更麾節晚境倦㳺乃能逍遥里第耽玩墳索抽毫漬墨述所得以自見於世所謂富貴不能淫年彌髙而德彌劭者宻齋有焉陸賈當功成名遂之餘乞身歸田擁車騎負寳劔遨逰諸子間釃酒撃鮮以自娯樂追思向來新語殆如夢事向子平隠居讀易自男婚女嫁之後斷絶家事勿使相關廼肆意於名山大川之觀曩時韋編不復過眼矣王逸少蘭亭一序似能言者及其守早退之節乂不過企慕子平所為盡山水之逰求藥石植桑果抱子弄孫以卒嵗於著書乎何有以宻齋視三子富貴年齒度越逺甚謂宜屏却簡編燕酣登眺可也而宻齋之所樂為有三子之所不克為者由是言之士大夫晚節嗜好有不迷其初者鮮矣觀宻齋自序謂以此書傳示子孫使知其老不廢學噫此其詒謀微意又可與俗人言哉越明年鋟梓郡齋輙為題其後鼓院名奕楙宻齋先生次子也寳祐丙辰夏五中澣通直郎添差通判撫州軍州兼管内勸農營田事王宗旦謹書
