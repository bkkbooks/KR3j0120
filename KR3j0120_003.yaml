body:
  text: 宻齋筆記巻三宋謝采伯撰太公曰富之而觀其無犯貴之而觀其無驕付之而觀其無轉使之而觀其無隠危之而觀其無恐事之而觀其無窮太公又曰一曰問之以言以觀其辭二曰窮之以辭以觀其變三曰與之以間諜以觀其誠四曰眀白顯問以觀其徳五曰使之以財以觀其亷六曰試之以色以觀其正七曰告之以難以觀其勇八曰醉之以酒以觀其態八徴備則賢不肖别矣周書云成王訪周公以民事周公陳六事以觀察之作官人曰富貴者觀其禮施貧賤者觀其徳守嬖寵者觀其不驕奢隠約者觀其不懾懼少者觀其恭敬好學而能悌壮者觀其亷潔務行而勝私老者觀其意慮慎强其所不足而不踰父子之間觀其孝慈兄弟之間觀其和友君臣之間觀其忠恵鄉黨之間觀其誠信省其居處觀其義方省其䘮哀觀其貞良省其出入觀其交友省其交友觀其任亷設之謀以觀其智示之難以觀其勇煩之事以觀其治臨之利以觀其不貪濫之樂以觀其不荒喜之以觀其輕怒之以觀其重醉之酒以觀其恭縱之色以觀其常逺之以觀其不狎邇之以觀其不倦復徴其言以觀其精曲省其行以觀其備荘子列禦冦篇引孔子曰凡人心險於山川難於知天故君子逺使之而觀其忠近使之而觀其敬煩使之而觀其能卒然問焉而觀其智急與之期而觀其信委之以財而觀其仁告之以危而觀其節醉之以酒而觀其則雜之以處而觀其色九徴至不肖之人得矣此太公周公孔子觀人之法最為詳宻蒙荘澹然若無意於世者亦誦斯言乃知蒙荘一書不皆寓言也荘子曰聖人不死大盜不止為之斗斛以量之則并與斗斛而竊之為之權衡以稱之則并與權衡而竊之為之符璽以信之則并與符璽而竊之為之仁義以矯之則并與仁義而竊之鄧析子曰原道語皆本此諸孫當聨在字為名余取在字自長孫在學外止有在徳在鎔在甄在冶甚佳閲王佩觧篇在字甚多儘可命名因錄之王者所佩在徳徳在利民民在順上合為在因時謀成在周長有功在力多昌大在自克不困在豫慎除害在能斷得民在知過用兵在知時勝大患在合人心化行在知和施舍在平心不幸在不聞其過福在受諌基在愛民固在親賢禍福在所宻利害在所近存亡在所用離合在出命尊在慎威安在恭巳老子曰禍兮福所倚福兮禍所伏鶡冠子與賈誼鵩賦同作賦者必蹈襲而栁河東云鶡冠子用鵩賦未知孰是韓退之却取其文郄儉梁鵠各受豐爵不次之除鵠得法於師宜官皆號善書者也魏晉以来楷書日盛皆鴻都門學之餘習正書遂為後世不刋之法與李斯之篆程邈之𨽻同科梁武教諸王書令殷鐡石於大王書中撮一千字不重者毎字一片紙雜碎無叙召周興嗣謂曰卿有才思為我韻之興嗣編次之一夕而成鬚髪皆白西都賦云清凉宣温乃四室名宣義當作暄暖之暄故集韻中以宣字見二十元字韻下注云天子室名也髙炳如説宣室如字讀乃武王伐紂而歸於此室梁昭眀序陶集云白璧㣲瑕惟在閑情一賦至傳方發眀其意以為曽祖晉世宰輔耻復屈身後代自宋髙祖王業漸隆不復肯仕故寄迹於酒閑情賦末章云坦萬慮以存誠憇遥情於八遐可謂發乎情性止乎禮義復何議焉余毎誦其總角聞道白首無成先師遺訓予豈墜之等語頗有洙泗氣象范雲為齊竟陵王府主簿王守㑹稽登秦望山雲以為山上秦始皇石刻文三句一韻人多作二句讀之便不叶韻雲嘗讀史記誦之如流中興頌亦三句一韻同齊名之人與警策詩句其實有優劣天生竒材天然竒句皆無對如鍾王羲獻歐虞李杜韓栁顔栁優劣自顯然故梁武帝蕭子雲評書皆云子敬不及逸少逸少不及元常杜詩韓筆顔書規模大氣韻髙古餘則失於華巧有餘如池塘生春草園栁變鳴禽紅藥當階翻蒼苔依砌上天際識歸舟雲中辨煙樹之類則第二句便不及竹送清溪月苔移玉座春之類上一句便不及當以是推之蘓潁濵言春秋時先王之澤未逺士君子重義理持節操其處死生之際卓然凛然非後世之士所及盖三代之遺民也當時達者語三代遺事甚多今捨此無以考證吕東莱推廣此意考究左氏著書源流本於此又曰初學記言前代人物醇疵自不逃正論但本朝儒先文獻相接未易以愛憎口舌輕議呵祖罵佛豈名教事要是文人相輕自古而然爾子華子今世之人其平居把握附耳呫呫相為然約而自保曽膠漆之不如也及勢利之一接未有毫髪之差蹴然而變乎色又從而隨之兵甚矣心術之善移也韓文用其意今夫平居里巷相慕悦至一旦臨小利害僅如毛髪反目若不相識落陷穽不一引手救反擠之又下石焉者皆是也張說燕公文屬思精壯長於碑誌詩得江山助釋學亦詣理超絶本朝蘓黄出入釋老唐人諸集盖鮮兼之燕公躬臨行陣制敵克勝本朝諸文儒又鮮兼之矣龜策傳云神能見夢扵元王而不能自出於漁者之籠身能十言盡當而不能通使於河還報於江賢能令人戰勝攻取不能自觧於刀鋒免剥刺之患聖能先知亟見而不能令衛平無言荘子稱仲尼曰語意同蘇文云公之精誠能開衡山之雲而不能回憲宗之惑能馴鱷魚之暴而不能弭皇甫鏄李逢吉之謗能信扵南海之民廟食百世而不能使其身一日安於朝廷之上句法同杯盤狼籍出滑稽傳正襟危坐出日者傳舉網得魚出龜策傳只改龜字余與客論文曰今人文不及古人藻繪處客問曰如何是藻繪處答曰古人文純是骨而後藻生焉今人文尚無骨安敢望其藻繪處客又問曰如何是骨答曰立意是也字古不如語古語古不如意古史月湖自言其作文法傳於曇橘州果齋先生云作詩寫字都先要有骨則其進未易量郄昻岐郇涇寧八坊馬記為李祐作云開元初二十四萬疋至十九年四十四萬疋與張燕公為王毛仲作隴右監碑略同然燕公記其政有八而郄昻止述馬名燕公文尤竒麗以隴右監石刻並觀優劣可見或曰西漢之末王褒文類俳今觀鄒枚文已近此體大率古賦之流如荀子諸賦豈非先秦古書但自王褒以後至晉唐文多類俳皆源流古賦亦如今時有一項古文又有一項四六神女賦云願假湏臾神女稱遽闇然而㝠不知其處若韓文云行李稱遽坡賦云開戸視之不見其處是四句之内兩鉅公皆用其字韓隠坡顯優劣自分食貨志云珠玉金銀饑不可食寒不可衣後漢劉陶鑄大錢議亦然喜雨亭記即是用此語但結尾活潑潑地把捉不得為不可及時東坡年二十三醉鄉王績字無功祭禹文云潦水降而寒潭清山光沉而白雲晚王勃云潦水靜而寒潭清煙光凝而暮山紫歸田錄載徳州長夀寺舍利碑云浮雲共嶺松長盖眀月與巖桂分叢亦與落霞與孤鶩齊飛秋水共長天一色同權徳輿文史臣賛云雅正贍縟余以富貴人為文詞自然温潤歐陽公其儔也劉歆云孔子沒而㣲言絶七十子終而大義乖風俗通義應劭序云仲尼沒而㣲言闕七十子䘮而大義乖唐眀皇孝經序同杜子美說旱上嚴武尤為偉論孟郊上盧使君養生書李義山作李賀小傳白樂天墓碑劉義傳文體竒逸不應止取其詩應劭曰昔客為齊王畫者王問畫孰最難孰最易曰犬馬最難鬼魅最易犬馬旦暮在人目前不類不可類之故難鬼魅無形者不見不見故易東坡净因院畫記常形常理用此意節孝先生曰文字要多作多作方思熟余無日不為文無時不吟哦歐陽公謂為文有三多㸔多做多商量多蘓文定公云前輩文但㸔做多劉禹錫自傳叙王叔文事云其官職出於叔文又復坐累不以為諱杜牧之自撰墓誌銘言注孫子推五星說相法文學之士多能如此甥裴延翰為集序文似李翺唐之文風大振於貞元元和之時韓栁倡其端劉白繼其軌當時學者涵泳攬其英華洗濯磨淬輝光日新茍有作者皆足以拔扵流俗自成一家之語延翰是巳牛僧孺鎮維揚牧之為書記召為侍御史僧儒以小箧邏卒報状示之感泣大慙後為公墓誌極稱其美報所知也牧之名聞一時累中科目意氣揚揚入一寺有僧静坐者見之不顧旁人為言此先輩近日甚有名譽僧亦不答牧之茫然自失以是知外名利者之髙如此彼方以趨名利者為可鄙宜其視之邈如也了翁弱冠苦羸疾因過汴河上遇道人云他日聲名滿天下又謂公曰曽讀左氏否左氏諸大戰反覆熟讀有快意處便是得藥公如其言誦之旬日間氣體頓壮讀檄愈頭風誦詩已痁疾亦自古有之朱文公為南豐作年譜云自孟韓子以来作者之盛末有至於斯何世之知公淺也至語録云坡谷只是飲酒賦詩快活後學未喻其去取之由㑹當有觧其意者李賀云天若有情天亦老少㳺詞天還知道和天也痩朱文公以為䙝瀆天帝乃是過用長吉語李方叔贈汝州太守詩云安得吾皇四百州皆如此邦二千石王梅谿西施舌詩云吳王無處可招䰟惟有西施舌尚存曽共君王醉長夜至今猶得奉芳樽有戒淫殺之意偶與僚友言之答云便可入清源續詩話熊克進九朝要畧轉一官李龜朋以詩賀之云翰苑前資漢碩儒苦心何翅十年餘修成當代将来法讀盡生平未見書黄帊奏篇登御府紫綸加秩下宸除近臣已是聞天語鸞鵲催歸定不虛李士美拜相雙親無恙生日詩云府前拍拍鶴翎開府裏紛紛賀客来尚書左丞生是日温詔欲挽陽春回下堂拜賜上堂去堂上雙親相顧語願身親見兒長年萬嵗千秋佐眀主生封父敷文閣待制楊元素張子野陳令舉至吴興東坡目為三面胡琴又州妓有姓周姓邵者呼為二南子野賦六客詞後子野令舉孝叔皆巳物故惟東坡元素公在爾元素詩寄東坡云僊舟㳺漾霅溪風三奏琵琶一艦紅聞望喜傳新政異夢魂猶憶舊歡同二南籍裏知誰在六客堂中已半空細問人間為宰相爭如願住水晶宫陳公輔詩白髪鬅鬙未得閑有時覽鏡笑衰顔逢人載酒寧辭醉寓意題詩不用删幸有鑑湖堪寄傲直慚書殿尚通班豁除簿領塵埃了却上蓬莱㸔好山州宅詩萬疊湖山煙水濵朱門畫㦸間松筠登臨不踏紅塵路燕寢長居紫府春晝靜欲驂風外駕夜寒疑是月中身我慙白首方懐紱猶得蓬莱作主人又蓬莱閣醉歸蓬莱閣下醉歸時猶索芳樽步步隨啼鳥似来留翠佩旁人笑為整花枝腰間半嚲黄金印頭上斜欹白接䍦拍手向他賔從道使君未老莫扶持菊譜范石湖略胡少瀹詳遼相李儼作黄菊賦獻其主耶律𢎞基𢎞基作詩題其後以賜之云昨日得卿黄菊賦碎剪金英填作句袖中猶覺有餘香冷落西風吹不去少瀹作御製誤張都監琳好作詞時芍藥盛放余戲令賦之云持節助調羹同僚皆笑其誤用梅事余曰韓詩云五鼎調芍藥張亦舉王維詩芍藥調金鼎子虚賦曰芍藥之和具而後御之南都賦曰歸雁鳴鵽香稻鮮魚以為芍藥師古曰芍藥其根主和五臓又辟毒故合之於蘭桂五味以助諸食也劉方叔作致語云東坡道人筆下無一㸃塵氣小范老子胷中有十萬兵機騎驢三十載久旅食於京華廣厦千萬間願大庇於寒士儻容尸祿免令自楚而之滕庶便奉親何異以栁而易播乞改辟楊囦四六餘話國初處州赴觧止六人取三人士子謝觧啟云類矍圃之觀人去者半留者半如孔門之取友益者三損者三秦檜子及第當時暗號有賦無天地詩有龍蛇後汪彦章賀啟有氣塞兩儀及東閣郎君之句以譏之一男子之上書初亦胡罪諸大夫之曰殺盖亦無心時斬陳東上時宰啟江朝宗與李宰啟月明苑外之封犬厖不吠風暖桑間之瑞雉乳自馴周洪道作守謝監司啟居閑從仕一生長恨於苦心多病非才二事恐煩於并案東坡詩云多病更非才二事可并案范文正初冒朱姓後歸宗啟志在逃秦入境遂稱夫張禄名非霸越乗舟偶效于陶朱用范雎范蠡是當家本事孝宗即位之九年再上太上尊號宣鄭聞與周必大草詔云未央上號符漢皇之九年興慶推尊邁唐宗之再請太上册夏后時洪内翰草詔云太姒之事太任長秋之奉長樂劉錡贈官制岑彭亡而公孫平諸葛死而仲達走自古皆有死嗟汝志之未伸與賊不俱生尚孤忠之可亮髙城纔百餘里此去何難哉寒食止數日間少住為佳耳决獄幾何錢榖出入幾何請問其略㑹計而已牛羊茁壯而已願效其能王季海代蕭特起答泉守魯柝聞邾雖限封疆之逺楚波及晉宜脩幣帛之恭王陽為孝子王尊為忠臣仰一時之髙節伊尹格皇天伊陟格上帝掩異姓之殊勛織文鳥章白斾央央山甫之北伐衮衣繡裳赤舄几几周公之東歸陳阜卿為教官答職事啟青衫試吏患在好為人師絳帳横經未必賢於弟子賀陳殿元啟坐崇薄俗共仰伯夷之風立辨寃民屢浹真卿之雨劉正甫行韓郡王贈官詞念一代所宗無如老臣者使九原可作豈畏匈奴哉又行南班詞葛藟之在河滸能芘其本根枤杜之生道周盖傷於寡特盖王室之强大必公族之盛蕃又進太上皇厯日表云雖宸心之運問朝野而不知而聖政之垂繫日月而可考蕭振侍郎秦檜當國日自四川謫他州未幾秦死再知四川誥詞云刻印銷印如轉圜朕常虚巳得馬失馬若反掌卿勿容心趙莊叔行江朝宗上留守湯相闗中復留蕭相國人傑已能用之江左自有管夷吾國事不足憂矣吾寜身蹈東海獨仲連不欲帝秦至今名重泰山㣲相如何以强趙醒庵行胡邦衡詞蒋世修脱身簿尉中繫馬庭階下以其便做教官故也又作紹興蔣相致語曲水流觴將舉暮春之褉西園傾盖好追清夜之逰甫遂及𤓰敢云張京兆之五日誓圖結草忍忘蘓刺史之二天賀湯丞相因進宗室譜圖并實録轉官武之穆文之昭爛若馬圖之制皇之墳帝之典迄於麟趾之年謂老馬之智專尚能識路若野鳥之視眩難使聞韶闖門褒愽袖珠玉以見投隠几侏􅍣褚衣裳而倒着四六本只是便宣讀要使如散文而有屬對乃善歐蘓只是一篇古文至汪龍溪而少變鄭侍郎望之云四六使重不如使輕使實不如使虛樟溪老人李龜年為其姪壻上巳致語云三月三日水邉豈無麗人一詠一觴蘭亭自有故事崇山峻嶺脩竹茂林羣賢畢集良辰美景賞心樂事四者難并女子近之則不遜豈容鑚穴以相窺老夫耄矣無能為是謂雖鄰而不覿廉宣仲嘲一老士大夫與娼鄰壁往時作四六者多用古人語及廣引故事以衒愽學而不思述事不暢近時文章體變如蘇氏父子以四六述叙委曲精盡不减古人自學者變格為文迨今三十年始得斯人不惟遲久而後獲實恐此後未有能繼者爾自古異人間出前後參差不相待余老矣乃及見之豈不為幸哉慶元二年丙辰余丞相拜左相權直院傳舍人伯夀草麻首聨云天乙之興中實為左相中乃仲虺也閤門舍人讀麻既讀破句又不識字當日察院入文字罷讀麻舍人得旨今後宣麻人與學士同鎻宿㸃句與之以便宣讀吕恵卿遭責謝表云蟲臂䑕肝悉㝠心於造化東坡謂福建子亦㑹做文字蟲臂䑕肝盖譏二蘇見東坡論列子由行詞遂寧糖氷正字劉望之賦以為傘子山異僧所授其法醡蔗成漿貯以甕缶列閒屋中閲冬而後發之成矣其略曰逮白露之既凝室人告子其亦霜獵珊瑚於海底綴珠琲於枯篁吸三危之秋氣陋萬蘂之蜂房碎玲瓏於齒牙韻沆爽於壺觴米帖云治咽喉諸疾廣南盛有不知始於何時李泰發題嵊縣黄山庵云十載清㳺得重尋風門小立契初心上盤直與雲天近下瞰不知巖壑深浥露黄花平襯地着霜紅葉巧依林他年願結香燈社竹杖芒鞋數共臨先皇考題云遼東鶴去幾千年堂上留題有謫僊十月山行風露冷黄花紅葉兩依然右二詩得於剡川相士黄山庵即其家墳先皇考為尉時曽㳺余主諸暨簿大雄寺行香見一小石刻中詩云琉璃葉下剪梧桐綠子青枝掃地空俗眼如何有青白好風安得問雌雄物隨塵境工榮顇人觸心兵戰異同只可輕帆理歸興暮雲蕭散大江東下題奕載不知何人時極暑晝夜鼓風槖老僕少獲更畨不輟余誦好風安得問雌雄而不記第三聫因閲舊箧得之錄以備忘宻齋筆記卷三
