body:
  text: 密齊筆記卷一宋謝采伯撰易緯稽覽圖云伏羲氏至無懷氏五萬七千八百八十三年神農五百四十年黃帝一千五百二十年少昊四百年顓頊五百年帝嚳三百五十年堯一百年舜五十年禹四百三十年殷六百四十四年按原本誤作四百九十六年周八百七十三年按原本誤作六十七年秦五十年已上六萬三千一百八十六年惟伏羲畫八卦傳于後代餘幾六萬餘年略無文字可考何耶抑有而不傳也班固曰唐虞以前雖有遺文其語不經故言黃帝顓頊之事未可明也又乾鑿度乃蒼頡注三墳五典八索九丘與素問等書皆書也非有而不傳者歟又曰春秋二百四十二年戰國二百二十五年秦四十年生漢髙祖三國五十六年晉一百六十年宋六十年齊二十四年梁八十七年按原本誤作五十六年陳三十三年隋三十七年生唐太宗五代共五十餘年生藝祖三大英主撥亂反正拯民塗炭漢尚髙厚唐立法度國祚悠久本朝用儒立國以仁卜世卜年永永無極漢興諸臣雖非粹然一出於正然皆能以功名自奮垂芳汗青者正以其一時言議合於事情而本於理義也沛公意欲留居秦宫中樊噲諫曰此奢麗之物皆秦所以亡沛公不聼張良又諌曰宜縞素為資二臣之諌周公之無逸也韓信言項王為匹夫之勇婦人之仁又言項羽實失天下之心又言約法三章秦民無不欲得大王王秦者韓信能占民心為趍向是三代之得天下以仁也項羽殺義帝三老董公遮說漢王曰仁不以勇義不以力宜率三軍素服以告諸侯而伐之此三王之舉也董公之言春秋討賊之誼也太公家令說太公曰天無二日土無二王皇帝雖子人主也太公雖父人臣也奈何令人主拜人臣後上朝太公擁篲迎門郤行是明於君臣之分也人皆曰漢初諸臣多粗暴凶詐之徒借以集事思之皆明於綱常合於禮義此理亘萬古未嘗一日泯滅也髙祖好酒及色范增又云貪財好色髙祖興王史臣安敢加毁緣是難遮掩未免直筆今觀其一入秦宫見帷帳狗馬重寶婦女以千數便欲留居賴二臣之諫回軍霸上一入彭城可謂重地便收其貨寶美人日致酒髙㑹是時無諌者遂一敗塗地及得天下又溺於戚姬幾欲廢太子微四皓則又是一場狼狽外物易移內欲易動幸迫於利害而止我朝藝祖真聖主也真宗嘗謂王旦曰每除拜宰相親王不御崇德殿不視朝其意以命宰相親王示不敢專也崇寧五年敕節文小鈔知通監造書押印造樣號年限條禁並依川錢法軍人官員請給不用外買賣倉場庫務出納依見錢行用三年為界大觀二年第一料其樣與今㑹子略同上假印准僞造鈔已成流三千里已行用者處斬至庚寅九月更不用中假印畫泉山下假平寫一貫文省守倅姓押字此㑹子兆端也紹興十二年户部張澄欲行㑹子給事中胡霈然沮之而止紹興三十二年竟行之今九十餘年其弊極矣而大觀小鈔民以為便者造之有限而換之有信也髙宗語東宫須是讀書便知古今治亂便不受人瞞朕初即位羣臣多勸法仁宗仁宗固是仁厚末年紀綱幾乎不振所幸得韓琦遂無事本朝自有太祖何故不取以為法聘后黃金二萬斤新莽用三萬斤晉志云漢用二百斤晉亦用二百斤往往金至後世愈少宋用銀五萬兩金五千兩南渡後又減至銀二萬兩金二千兩南齊正月上辛祠昊天次辛祭后土十一月元日祈榖于上帝注云謂以上辛郊祭天地郊特牲云郊之用辛也周之始郊日以至注云陽氣新用事而用辛日此說非也用辛日者凡為人君者當齊戒自新也神宗朝冬至當十一月晦有言晦不可郊而無人知此故事惟宋敏求云太祖乾德初郊亦是十一月晦日遂用當月十六日甲子郊國朝㑹要不載此事乃宋次道家收得朝報神宗大嘉之龔飬正所撰載之甚詳慶元丙辰宏詞出乾德初郊慶成頌試者非特不知晦日本末有一卷乃云祖宗並侑又云歸胙慈極不知乾德時既未有家廟杜太后已上仙亦未嘗有慈極近年郊祀只用黃琮蒼璧却不見用四圭有人問禮官云四圭兩圭已於景靈宮用了黃琮蒼璧乃是禮見天地宰執子授京秩始於吕蒙正時政記進御始於李昉班直八年叙補軍校始於髙瓊起居注進御始於梁周翰𢃄職致仕始於王文正公旦糊名考校始於周起建議宣和時彗星竟天徽宗震怒謂趙挺之曰蔡京所為皆如卿言京免相挺之復為右僕射始京在崇寧初首興邊事用兵連年不息一日徽宗諭輔臣曰朝廷不可與邊庭生隙釁端一開日尋干戈生民肝腦塗地豈人君愛民之意挺之退語同列曰主上志在愛民息兵吾輩義當將順時執政皆京黨但唯唯而已以准皆各其及即若王元澤以此八字該括法律天聖四年州軍並不得官置醋坊近陳提舉振孫博通古今仰體祖宗恤民之意舉行萬户停廢醋庫邦人至今德之東京記舊八作司太平興國二年分東西二司乃泥作赤白作桐油作石作磚作瓦作竹作井作以上名八作後兼備攻城之事乃二十一作天聖元年置官屬今八作司獨傳伎巧之物若致逺務裁造院茶湯磨院針線院布庫鑄場務煎膠務擊鞠院雲韶班院印經院燒朱所新衣庫菜庫纎悉畢備及前宰執侍從大第環拱蓋以百數錢塘駐蹕庶事草創追想全盛太息久之都麴院麴賣於酒户西京南京皆然東京在城每嵗四十七萬四千六百四十五貫南京在城賣麴三萬六百九十貫二百一十七文五十里外務場别有數台州在城及諸邑縣諸路橋港頭酒額每嵗八萬一千二百九十八貫泊宅編云院之井滓穢不堪汲用惟以造麴特善他井皆不如開寶二年詔麴價髙可於十分中減放二分六年減價每斤止收一百文足陌太平興國六年詔在京賣麴每斤元定二百文自今每斤減五十文淳化五年有司言諸道州府先置𣙜酤募民掌其事內四百七十處嵗額無幾願一切罷之但賣麴收直詔從其請景德元年罷江淮兩浙荆湖制置𣙜酤澶淵之役射殺其貴將逹賚遂潰曹利用與其飛龍使韓把見行在議盟真宗謂輔臣曰初欲令石普楊延邀其歸路而以精兵踵其後腹背擊之然兵連禍結何時而已故狥其請以休息天下之民若彼自渝盟以順伐逆殆未晚也當人主英斷事力全盛人材輻凑可以戰而不戰果享百餘年和好之利兵端果可輕開耶范蜀公正書云舜之五刑者流也宮也教也贖也賊也流宥五刑者舜制五流以宥三苗之劓刖宫大辟也書曰苗民弗用靈制以刑惟作五虐之刑曰法者此也堯所以哀矜庶獄之不辜遏絶之使無世在下也舜其仍用之乎仍用之則是踵苗之五虐而遂有十刑安得云明于五刑以弼五教堯嘗清問下民廢去此法矣至禹時德既下衰方用此肉刑揚子云夏后肉辟三千不膠者卓矣然禹亦未必用只是用之以為贖刑吕刑所謂訓夏贖刑也直至秦時方用如黥太子傅之類是也至漢文帝又不用至宋文帝因劫賊有赦方于劫賊面上刺一劫賊字至五代後周刺配之法盛矣大率流始于堯舜墨始于苗贖始于禹先皇考與范寺簿說羅大著㸃囚輪對劄子乞減配法乃是近日配人之多張方平亦有劄子羅乃繳帖在前上付來棘寺諸公議論將茶鹽犯法之人删改太輕户部沮而不行金匱曰武王伐紂雪文餘漢宣帝本始元年胸奴擊烏孫欲還㑹天大雪一日文餘民畜凍死殺數萬級馬數萬匹唐李訴因天大雪疾馳百二十里到蔡破其門平蔡吐蕃諾邏兵入大斗㑹天大雪吐蕃皸凍趨西道以歸王君㚟率秦州都督張景順約乘氷縱兵盡俘以旋白元光合回紇兵于靈臺雪氛嚴晦吐蕃閉營撤備乃縱擊之斬首五萬級生擒萬人收所俘唐户五千嘉熙丁酉十二月大雪中大敗金人捷旗報積尸如山豈非雪霜肅殺之氣有以助之歟張滙節要云二太子斡喇布之妻余輦公主乃遼主天祚之女尼瑪哈之妻蕭氏乃遼主天祚之元妃各因間勸賊南冦隂報朝廷助兵攻遼之隙又秦檜上斡喇布尼瑪哈書曰切觀大金今日計議之士多前日大遼亡國之臣畫籌定計非忠於大金也假威大金以報其怨爾大遼妃女隂報於內大遼之臣若伊都郭藥師輩贊謀於外乃吾國厄㑹所致鄭介夫俠聞子姪用王氏學講考槃之義曰非也忿戾若此何以為碩人弗諼者弗忘君也弗告者弗以君為過也弗告者弗以告他人也介夫上監門圖已感動上意見於施行及流落挫折之餘一話一言未嘗不在君父君臣之倫盡矣橫渠張子厚著西銘有曰不弛勞而底豫舜其功也無所逃而待烹申生其恭也是皆聖賢能處人倫之變父子之倫明矣劉庭式娶瞽女後倅密州喪之逾年而哀不衰東坡問曰哀生於愛愛生於色今君愛何從生哀何從出乎庭式曰吾知喪吾妻而已吾若緣色而生愛緣愛而生哀色衰愛弛吾哀亦忘則凡揚袂倚市目挑而心招者皆吾妻也夫婦之倫得矣司業趙彥昭兄弟訓引姜肱李充陳業徐苗許荆李鴻二孔兩趙隂慶卜式桑虞蔡雍以為勸反覆千餘言兄弟之倫著矣二程之門諸友若遊酢謝良佐吕大臨楊時東坡之門若黃庭堅秦觀張耒朝補之儒學文藝俱有切磋琢磨之益交朋之風不其盛歟此我朝之治所以逺過漢唐也江州冢記其略曰開寶乙亥嵗問罪于李煜曰朕司億兆許卿不殺而弗信乎煜弗之悟繇是流矢蝟集其宫擒煜于纛下江州蟻聚詬罵王師先鋒曹翰竟屠其城橫死三萬七千餘明年丁丑皇帝嗣位太平興國之二載太子中允臣周敬述銜命察俗又獲遺骸一萬七千窆于廣陽門外本朝以仁立國未嘗妄殺獨曹翰一軍輕肆其鋒曹彬有賢嗣而翰無後天道昭然矣湘山録載咱居潤董思誨党進三人皆不識字本傳但書其戰功多不責以文學史法當然如晦野史所以備言之國初人物洪毅沉鷙為有餘浮華緣飾為不足便立得功業與中葉人物不同張子韶在經筵太上語以朕用人盡付之公道子韶奏云陛下付之公道只得古人一半太上問其故曰孟子曰左右皆曰賢未可也諸大夫皆曰賢未可也國人皆曰賢然後察之見賢焉然後用之必須又斷之斯可也太上又云臺諫不可承宰相風㫖子韶奏云以臣觀之非特不可承宰相風㫖亦不可承人主風㫖杜黃裳為河中尹盧坦為尉召坦曰某家子與惡人遊破産盍察之坦曰凡居官亷雖大臣無厚畜其能積財者必剝下以致之如子孫善守是天富不道之家不若恣其不道以歸於人黃裳驚其言自是禮遇加厚張于湖何侍郎異余提刑澄並大書刻之石黃裳除吏不甚别流品通饋謝無潔白名又納髙崇文錢四萬五千緡卒後御史劾奏子載辭服坦乃得持其短不然一尉之微安敢抗對如此李翺集坦傳亦載其事本朝惟文潞公建雙節終亦辭了貼麻不行韓忠武建鎮南武安寧國三節出于異數紹興九年朝陵乃范如圭之請髙宗云非卿不聞此言其夫田一書真有志事功之士惜不見於用國史秦檜傳云校書郎范如圭上檜書責以曲學倍師忘讎辱國之罪且曰公不喪心病狂奈何一旦為此若不早改圖必且遺臭萬世未幾如圭奉祠中興小歷遺其書范乃元祐故家也景祐四年安平縣主言夫吳守正父元隨范喜居漣水軍欲聼喜添錢開酟海州沭陽縣周穰村酒務詔開封府召喜及寫狀人本宫管當人勘罪施行又張乖崖判百姓乞增撲酒課利狀云將五分折變於官錢是一倍增擡於酒利加水減料使百姓有言置我何地是時朝廷州郡皆不許人剗奪令但給與髙價蓋不復為後人慮也常州通判沈長卿上參政李光啓曰搢紳守和親本出婁敬之下䇿空言難信結孰慮吐蕃之劫盟夷考贊普兵敗獻馬黃金求婚景龍二年還其婚帝以雍王守禮女為金城公主妻之開元二年其相上書宰相請盟上令姚崇報書載辭未及定而十萬之師已冦臨洮入蘭渭永泰請和詔宰相杜鴻漸等同盟而僕固懷恩不得志導其長犯邊衆二十萬已逼奉天懷恩死遂無謀主復遣使來聘詔宰相與吐蕃使者盟俄冦靈州蓋不止劫渾瑊平凉盟變起倉卒而已終唐之世凡九和而十四戰皇甫惟明曰皆其邊將好功之人為之固有是說亦其主不守信義所致尚主者二自稱甥舅之國而數為邊患人主撫有四海以婉冶之姿逺適異地詬辱甚矣君臣莫之恥也五代以來幸免此患嚴尤以漢為無䇿長卿可謂正論權姦文致其罪株連正人嘻其甚矣王欽若欲為相王文正公旦纍抑之云祖宗朝不曾用南人當國故欽若以立賢無方之說動真廟之聽真廟以問文正文正云立賢無方必須賢而後可熙寧以後更改祖宗法度而羣小又主紹述之說以三年無改於父之道合為一談稔成靖康之禍孔孟之言豈誤天下後世邪王文正公云必須賢而後可王欽若果賢者邪無改於父之道謂合乎道者無改不合乎道者改之可也朱文公注曰方猶類也惟賢則立之於位不問其類也李迪挫丁謂姦邪之鋒於正熾之時王曾乘丁謂之失而能暴其彌天之罪進君子退小人此秉鈞衡者第一義王文正旦遂無如之何文正得君如此不能以身為去就去王欽若丁謂况他相哉馮拯為之營救惠姦莫甚焉仁宗朝王安石知制誥賞花釣魚內侍各以金楪盛釣餌置几上安石食之盡明日帝謂輔臣曰王安石詐人也老蘇云王安石乃盧把王衍合為一人天下將被其禍後安石參政御史中丞吕晦叔云安石外示朴野中藏巧詐驕蹇慢上隂賊害物大姦得路羣隂彚進則賢者漸去亂由是生誤天下蒼生者必斯人矣安石嘗奏言中書處分劄子皆稱聖㫖不中理者十有八九宜只中書自出牒帝愕然唐介曰如安石所陳則是政不自天子出李師中始仕州縣邸報包拯三事師中曰包公何能為今鄞縣王安石眼多白甚似王處仲他日亂天下必此人也陳了翁每謂天下事變故無常唯稽考往事則有以知其故而應變王氏之學乃欲廢絶史學而咀嚼虛無之言其事與晉無異必亂天下彈蔡京文曰絶滅史學一似王衍重南輕北分裂有萌逮今三十餘年而所言無不驗者人固未易知亦豈有終不可知者安石聖君知其詐羣賢知其奸或遏於已用或爭於已行非無其人而治亂所由分定數有不可逃爾新刋荆公字說二十四卷前無序引後無題跋獨雷抗為之注天下公論昭然明矣余乃平心定氣而言曰此許慎說文解字也雷抗即徐鍇之傳釋也但以之解六經導後學則穿鑿之論蜂起豈大儒所為也王安石廢了銅禁不知在何時張樂全奏議云自王安石為政始罷銅禁姦民日銷錢為器邊關海舶不復譏錢之出入故中國錢耗而西南北三邊皆山積請詰問安石舉纍朝之令典所以體國便民者一旦削而除之其意安在王安石以六經文姦似王莽蔡京黨籍錮正人似東漢中常侍秦檜興大獄陷忠良似李林甫本朝纍聖相承仁厚恭儉過漢之文景此三小人傷政害國言路荆棘外敵侵陵可為痛哭通州使君徐先生云當時闢新法者甚衆然都攻他不破惜乎諸公思慮不及此成周之法大處是井田封建荆公大底不曾行得却如何要把細碎處來行失了大綱目理㑹末節只就他裏面㸃檢其說當自息秦檜修禮樂文太平止專用一宦者邵諤主之人呼為邵局今渾儀樂器中猶鑄邵姓名禮樂之器間有不合經典處是缺名儒討論京師失守自耿南仲主和靖康播遷自何㮚主和維揚失守自汪伯彥黃潜善主和金人之變自秦檜主和議者乃曰外雖和內不忘戰此又其向來權臣誤國之言也一溺於和將士解體尚能戰乎此胡淡菴之論若然則景德慶歷之和致一百七十餘年承平之效非歟冦萊公富鄭公輩果誤國者歟余曰和在我則為禦侮在人則為納侮紹興八年金國遣烏凌噶來議和豪長逹賚主之上雖聽檜計與之和實疑其詐王倫奏北有悔割地意繼誅逹賚十年烏珠集兵祁州分四道入侵檜言於上曰臣昨見金國逹賚有講和割地之議故贊陛下取疆土及烏珠戕其叔逹賚和議已變故贊陛下定弔伐之計金之初和也諸將有異議及其果叛盟益以和為非檜有再和之議獨患諸將難制於是范同獻䇿召三大將既至遂皆拜樞管而罷其兵三十一年金人復敗盟侵淮此紹興和議始末至隆興甲申和議定而開禧丙寅復自渝盟矣中興小歷云龜年論右僕射秦檜云主和則沮止國家恢復逺圖且植黨日衆專國自恣漸不可長檜即上章辭位旋奉祠其子衡守嚴州日録其父彈秦檜文投平津止及其彈秦檜婦翁王次山姻婭王昻及楊願兄梓等不言其主和何也必是别有一疏不主和議其子失記録而彈王仲等事小歷又失於記録爾密齊筆記卷一
